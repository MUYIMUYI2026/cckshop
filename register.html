<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account – CCKShop</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 48px 24px; background: var(--gray-light); }
    .auth-card { background: #fff; border-radius: 16px; border: 1.5px solid var(--gray-mid); padding: 48px; width: 100%; max-width: 480px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo img { height: 40px; margin: 0 auto; }
    .auth-card h1 { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .auth-card .subtitle { text-align: center; color: var(--gray-text); font-size: 0.9rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.88rem; font-weight: 600; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-mid); border-radius: 8px; font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,208,132,0.15); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .auth-divider { text-align: center; color: var(--gray-text); font-size: 0.85rem; margin: 20px 0; position: relative; }
    .auth-divider::before, .auth-divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--gray-mid); }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--gray-text); }
    .auth-footer a { color: var(--green); font-weight: 600; }
    .checkbox-group { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; color: var(--gray-text); }
    .checkbox-group input { width: auto; margin-top: 2px; accent-color: var(--green); }
    .checkbox-group a { color: var(--green); }
  </style>
</head>
<body>
  <div class="announcement-bar">
    <div class="announcement-inner"><span>🛡️ 100% Authenticity Guaranteed</span><span>✅ Free to Join</span></div>
  </div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="index.html"><img src="assets/images/logo.png" alt="CCKShop" /></a></div>
      <h1>Create Your Account</h1>
      <p class="subtitle">Join CCKShop for free and start shopping today</p>
      <form>
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" placeholder="John" required /></div>
          <div class="form-group"><label>Last Name</label><input type="text" placeholder="Doe" required /></div>
        </div>
        <div class="form-group"><label>Email Address</label><input type="email" placeholder="john@example.com" required /></div>
        <div class="form-group"><label>Password</label><input type="password" placeholder="Create a strong password" required /></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" placeholder="Repeat your password" required /></div>
        <div class="form-group">
          <label class="checkbox-group">
            <input type="checkbox" required />
            I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px">Create Account</button>
      </form>
      <div class="auth-footer">Already have an account? <a href="login.html">Sign In</a></div>
      <div class="auth-footer" style="margin-top:8px">Are you a business? <a href="wholesale.html">Apply for Wholesale</a></div>
    </div>
  </div>
</body>
</html>
