<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – CCKShop</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 48px 24px; background: var(--gray-light); }
    .auth-card { background: #fff; border-radius: 16px; border: 1.5px solid var(--gray-mid); padding: 48px; width: 100%; max-width: 440px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo img { height: 40px; margin: 0 auto; }
    .auth-card h1 { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .auth-card .subtitle { text-align: center; color: var(--gray-text); font-size: 0.9rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.88rem; font-weight: 600; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-mid); border-radius: 8px; font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,208,132,0.15); }
    .form-footer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 0.85rem; }
    .form-footer-row a { color: var(--green); font-weight: 600; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--gray-text); }
    .auth-footer a { color: var(--green); font-weight: 600; }
  </style>
</head>
<body>
  <div class="announcement-bar">
    <div class="announcement-inner"><span>🛡️ 100% Authenticity Guaranteed</span><span>✅ Free to Join</span></div>
  </div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="index.html"><img src="assets/images/logo.png" alt="CCKShop" /></a></div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your CCKShop account</p>
      <form>
        <div class="form-group"><label>Email Address</label><input type="email" placeholder="john@example.com" required /></div>
        <div class="form-group"><label>Password</label><input type="password" placeholder="Your password" required /></div>
        <div class="form-footer-row">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" style="accent-color:var(--green)" /> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center">Sign In</button>
      </form>
      <div class="auth-footer">Don't have an account? <a href="register.html">Create Account</a></div>
    </div>
  </div>
</body>
</html>
